<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" fill="none" role="img" aria-label="MLZ · Design — one design system, every project">
<style>
@font-face{font-family:'Space Grotesk';font-weight:700;font-style:normal;src:url(data:font/woff2;base64,) format('woff2')}
@font-face{font-family:'Space Mono';font-weight:700;font-style:normal;src:url(data:font/woff2;base64,) format('woff2')}
@font-face{font-family:'Space Mono';font-weight:400;font-style:normal;src:url(data:font/woff2;base64,) format('woff2')}
:root{--bg:#ecebe4;--fg:#1a1a18;--muted:#63615a;--line:#cbc9be;--card:#f2f1ea;--accent:#00c4c4;--period:#007980;--gridc:26,26,24}
@media (prefers-color-scheme:dark){:root{--bg:#21201d;--fg:#eceae3;--muted:#a3a199;--line:#46443f;--card:#2b2a26;--accent:#00c4c4;--period:#00c4c4;--gridc:236,235,228}}
text{font-family:'Space Mono',monospace}
.grid{stroke:rgb(var(--gridc));stroke-opacity:.05}
.frame{stroke:var(--line);stroke-opacity:.7}
.corner{stroke:var(--accent);stroke-width:2;fill:none}
.word{font-weight:700;font-size:29px;letter-spacing:-.9px;fill:var(--fg)}
.eyebrow{font-size:13px;letter-spacing:3.4px;fill:var(--muted)}
.head{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:54px;letter-spacing:-1.1px;fill:var(--fg)}
.desc{font-size:16px;fill:var(--muted)}
.ins{font-size:14px;fill:var(--fg)}
.foot{font-size:13px;letter-spacing:2.3px;fill:var(--muted)}
.badge{font-size:11px;letter-spacing:1.8px;fill:var(--muted)}
.chip{fill:var(--card);stroke:var(--line)}
</style>
<rect width="1280" height="340" fill="var(--bg)"/>
<g class="grid"><line x1="40" y1="0" x2="40" y2="340"/><line x1="80" y1="0" x2="80" y2="340"/><line x1="120" y1="0" x2="120" y2="340"/><line x1="160" y1="0" x2="160" y2="340"/><line x1="200" y1="0" x2="200" y2="340"/><line x1="240" y1="0" x2="240" y2="340"/><line x1="280" y1="0" x2="280" y2="340"/><line x1="320" y1="0" x2="320" y2="340"/><line x1="360" y1="0" x2="360" y2="340"/><line x1="400" y1="0" x2="400" y2="340"/><line x1="440" y1="0" x2="440" y2="340"/><line x1="480" y1="0" x2="480" y2="340"/><line x1="520" y1="0" x2="520" y2="340"/><line x1="560" y1="0" x2="560" y2="340"/><line x1="600" y1="0" x2="600" y2="340"/><line x1="640" y1="0" x2="640" y2="340"/><line x1="680" y1="0" x2="680" y2="340"/><line x1="720" y1="0" x2="720" y2="340"/><line x1="760" y1="0" x2="760" y2="340"/><line x1="800" y1="0" x2="800" y2="340"/><line x1="840" y1="0" x2="840" y2="340"/><line x1="880" y1="0" x2="880" y2="340"/><line x1="920" y1="0" x2="920" y2="340"/><line x1="960" y1="0" x2="960" y2="340"/><line x1="1000" y1="0" x2="1000" y2="340"/><line x1="1040" y1="0" x2="1040" y2="340"/><line x1="1080" y1="0" x2="1080" y2="340"/><line x1="1120" y1="0" x2="1120" y2="340"/><line x1="1160" y1="0" x2="1160" y2="340"/><line x1="1200" y1="0" x2="1200" y2="340"/><line x1="1240" y1="0" x2="1240" y2="340"/><line x1="0" y1="40" x2="1280" y2="40"/><line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="200" x2="1280" y2="200"/><line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="280" x2="1280" y2="280"/><line x1="0" y1="320" x2="1280" y2="320"/></g>
<rect x="22" y="22" width="1236" height="296" class="frame"/>
<path class="corner" d="M22 44 V22 H44"/>
<path class="corner" d="M1236 22 H1258 V44"/>
<path class="corner" d="M22 296 V318 H44"/>
<path class="corner" d="M1236 318 H1258 V296"/>

<g transform="translate(54,54) scale(1.3125)">
  <rect x="1" y="1" width="30" height="30" rx="6" fill="var(--fg)"/>
  <polygon points="7,25 7,7 12,7 16,14.5 20,7 25,7 25,25 20.6,25 20.6,13.6 17.4,19.4 14.6,19.4 11.4,13.6 11.4,25" fill="var(--bg)"/>
</g>
<text x="110" y="85" class="word">mlz<tspan fill="var(--period)">.</tspan></text>
<text x="54" y="120" class="eyebrow">MLZ · DESIGN SYSTEM</text>

<text x="54" y="208" class="head">Design</text>
<text x="54" y="256" class="desc">One canonical source of colour, type, style and motion for every project.</text>

