# zizmor configuration — https://docs.zizmor.sh/configuration/
rules:
  cache-poisoning:
    ignore:
      # The release job publishes on merge to main. setup-node sets no `cache:`
      # input (it restores no package cache) and setup-bun runs with
      # `no-cache: true`, so there is no runtime cache to poison here.
      - release.yml
