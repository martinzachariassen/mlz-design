name: Release

# Tag-driven release. Bump the version locally, then push a `v*` tag to publish:
#   bun run changeset          # record the change
#   bun run version-packages   # apply bumps + CHANGELOG, consume changesets
#   git commit -am "release: v<x.y.z>"
#   git tag v<x.y.z> && git push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          registry-url: "https://npm.pkg.github.com"
          scope: "@martinzachariassen"
      - run: bun install --frozen-lockfile
      - run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
