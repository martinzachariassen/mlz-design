name: Release

# Tag-driven release. Bump the version locally, then push a `v*` tag to publish:
#   bun run changeset          # record the change
#   bun run version-packages   # apply bumps + CHANGELOG, consume changesets
#   git commit -am "release: v<x.y.z>"
#   git tag v<x.y.z> && git push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # npm build provenance (Sigstore attestation)
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
          no-cache: true # publishing job — don't restore a poisonable cache
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 26
          registry-url: "https://npm.pkg.github.com"
          scope: "@martinzachariassen"
      - run: bun install --frozen-lockfile
      - run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
