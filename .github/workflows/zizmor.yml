name: Zizmor

# Static analysis of the GitHub Actions workflows themselves (injection,
# over-broad permissions, unpinned actions…). Results land in the Security tab.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "45 6 * * 1"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the SARIF results
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Run zizmor
        run: pipx run zizmor==1.28.0 --format sarif . > zizmor.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
